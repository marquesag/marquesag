  <text x="370" y="30" fill="#c9d1d9" style="white-space: pre;" transform="matrix(1, 0, 0, 1, 8.057432174682617, 0.8952699303627014)"><tspan x="370" dy="1em">​</tspan><tspan x="370" y="30">lucas@marques</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="50">——————</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="70" class="keyColor">OS</tspan>: <tspan class="valueColor">Arch Linux, iOS</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="90" class="keyColor">Uptime</tspan>: <tspan class="valueColor">years, 8 months, 12 days</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="110" class="keyColor">Certifications</tspan>: <tspan class="valueColor">Oracle Data Management Foundations, RU330: Redis</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="130" class="keyColor">Kernel</tspan>: <tspan class="valueColor">Bachelor's Degree in Software Engineering</tspan><tspan class="commentColor"> #UNINTER</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="150" class="keyColor">IDE</tspan>: <tspan class="valueColor">VsCode 1.85.0, WebStorm 2023.3.1, StackBlitz, Replit</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="190" class="keyColor">Backend</tspan>.<tspan class="keyColor">Tech</tspan>: <tspan class="valueColor">Node JS, PHP, MySQL, MongoDB, Python</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="210" class="keyColor">Frontend</tspan>.<tspan class="keyColor">Tech</tspan>: <tspan class="valueColor">React JS, Tailwind, JS(TS), HTML, CSS(Sass)</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="230" class="keyColor">Languages</tspan>.<tspan class="keyColor">Life</tspan>: <tspan class="valueColor">English, Portuguese</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="270" class="keyColor">Other</tspan>.<tspan class="keyColor">Tools</tspan>: <tspan class="valueColor">Docker, AWS, Azure, Ansible, Firebase, Ngrok, WSL</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="290" class="keyColor">D</tspan>.<tspan class="keyColor">Skills</tspan>: <tspan class="valueColor">Normalization &amp; Modeling (DB), UI/UX, Figma, Pentesting</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="330" class="keyColor">Contact</tspan>:<tspan x="370" dy="1em">​</tspan><tspan x="370" y="350">——————</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="370" class="keyColor">Email</tspan>: <tspan class="valueColor">marqueslucasag@gmail.com</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="390" class="keyColor">Figma, Medium, Reddit</tspan>: <tspan class="valueColor">@marquesag</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="410" class="keyColor">Telegram</tspan>: <tspan class="valueColor">@marr9ques</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="450" class="keyColor">Articles on Medium.com</tspan>:<tspan x="370" dy="1em">​</tspan><tspan x="370" y="470">——————</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="490" class="keyColor">"Bun vs Node JS: Uma análise necessária" </tspan>| <tspan class="valueColor">https://bit.ly/3teoBsu4</tspan><tspan x="370" dy="1em">​</tspan><tspan x="370" y="510" class="keyColor">"A diferença entre os tipos de Kernel Linux" </tspan>| <tspan class="valueColor">https://bit.ly/489nWr8</tspan> <tspan x="370" dy="1em">​</tspan></text>
